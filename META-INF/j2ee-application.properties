# J2EE Application Deployment Descriptor for FizzBuzz Enterprise Application
# Application Name: FizzBuzzEnterpriseEngine
# Version: 1.0.0-EAR
# Deployment Plan: STANDARD_FULLY_DECORATED

application.name=FizzBuzzEnterpriseEngine
application.version=1.0.0-EAR
application.deployment.plan=STANDARD_FULLY_DECORATED

# CORBA/IIOP Naming Service Configuration
corba.naming.service.port=1050
corba.naming.service.host=localhost
corba.naming.service.ior.repository=FizzBuzzComputationRepository
corba.naming.service.ior.version=1.0

# JNDI Initial Context Configuration
java.naming.factory.initial=com.enterprise.fizzbuzz.jndi.StandardJndiContextFactoryImpl
java.naming.provider.url=localhost:1099

# EJB Configuration
ejb.fizzbuzz.home.jndi=ejb/fizzbuzz/ComputationEJB
ejb.fizzbuzz.home.interface=com.enterprise.fizzbuzz.ejb.contracts.IEjbHome
ejb.fizzbuzz.remote.interface=com.enterprise.fizzbuzz.ejb.contracts.IEjbObject
ejb.fizzbuzz.bean.class=com.enterprise.fizzbuzz.ejb.impl.FizzBuzzComputationEjbSessionBeanImpl
ejb.fizzbuzz.session.type=Stateless
ejb.fizzbuzz.transaction.type=Container

# RMI Registry Configuration
rmi.registry.port=1099
rmi.registry.host=localhost
rmi.remote.object.name=FizzBuzzComputationRmiRemote

# SLO/SLA Monitoring Thresholds
slo.computation.threshold.ms=50
sla.monitoring.enabled=true
sla.violation.alert.endpoint=/jmx/alert/FizzBuzzSlaViolationAlertMBean
