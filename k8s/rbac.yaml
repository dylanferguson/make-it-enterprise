apiVersion: v1
kind: ServiceAccount
metadata:
  name: fizzbuzz-service-account
  namespace: fizzbuzz-system
  labels:
    app: fizzbuzz
    tier: enterprise
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fizzbuzz-role
  namespace: fizzbuzz-system
  labels:
    app: fizzbuzz
    tier: enterprise
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fizzbuzz-role-binding
  namespace: fizzbuzz-system
  labels:
    app: fizzbuzz
    tier: enterprise
subjects:
  - kind: ServiceAccount
    name: fizzbuzz-service-account
    namespace: fizzbuzz-system
roleRef:
  kind: Role
  name: fizzbuzz-role
  apiGroup: rbac.authorization.k8s.io
