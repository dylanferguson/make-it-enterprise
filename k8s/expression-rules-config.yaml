apiVersion: v1
kind: ConfigMap
metadata:
  name: fizzbuzz-expression-rules-config
  namespace: fizzbuzz-system
  labels:
    app: fizzbuzz
    tier: enterprise
    pattern: interpreter
data:
  FIZZBUZZ_EXPRESSION_EVALUATOR_ENABLED: "true"
  FIZZBUZZ_EXPRESSION_EVALUATOR_VERSION: "1.0.0-ENTERPRISE"
  FIZZBUZZ_EXPRESSION_RULESET_NAME: "FizzBuzzRuleSet"
  FIZZBUZZ_EXPRESSION_RULESET_VERSION: "1.0.0-ENTERPRISE"
  FIZZBUZZ_RULE_DIVISIBLE_BY_3_LABEL: "Fizz"
  FIZZBUZZ_RULE_DIVISIBLE_BY_3_PRIORITY: "50"
  FIZZBUZZ_RULE_DIVISIBLE_BY_5_LABEL: "Buzz"
  FIZZBUZZ_RULE_DIVISIBLE_BY_5_PRIORITY: "25"
  FIZZBUZZ_RULE_DIVISIBLE_BY_15_LABEL: "FizzBuzz"
  FIZZBUZZ_RULE_DIVISIBLE_BY_15_PRIORITY: "100"
  FIZZBUZZ_EXPRESSION_DECORATOR_ENABLED: "true"
