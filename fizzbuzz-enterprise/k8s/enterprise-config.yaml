apiVersion: v1
kind: ConfigMap
metadata:
  name: fizzbuzz-enterprise-config
  namespace: fizzbuzz-system
  labels:
    app: fizzbuzz
    tier: enterprise
data:
  FIZZBUZZ_CACHE_ENABLED: "true"
  FIZZBUZZ_SESSION_MANAGEMENT_ENABLED: "true"
  FIZZBUZZ_AUDIT_TRAIL_ENABLED: "true"
  FIZZBUZZ_METRICS_ENABLED: "true"
  FIZZBUZZ_RETRY_COUNT: "3"
  FIZZBUZZ_LIFECYCLE_MANAGER_ENABLED: "true"
  FIZZBUZZ_RESOURCE_ADAPTER_ENABLED: "true"
  FIZZBUZZ_SLO_TARGET_LATENCY_P99_MS: "50"
  FIZZBUZZ_SLO_TARGET_AVAILABILITY: "0.999"
  FIZZBUZZ_CONNECTION_POOL_SIZE: "10"
  FIZZBUZZ_TRANSACTION_TIMEOUT_MS: "30000"
  FIZZBUZZ_APPLICATION_VERSION: "3.0.0-ENTERPRISE"
  FIZZBUZZ_EVALUATION_CHAIN_ENTERPRISE_MODE: "true"
  FIZZBUZZ_EVALUATION_CHAIN_VALIDATION_ENABLED: "true"
  FIZZBUZZ_EVALUATION_CHAIN_METRICS_ENABLED: "true"
  FIZZBUZZ_EVALUATION_CHAIN_LATENCY_THRESHOLD_ENABLED: "true"
  FIZZBUZZ_EVALUATION_CHAIN_LATENCY_WARN_MS: "5"
  FIZZBUZZ_EVALUATION_CHAIN_LATENCY_CRITICAL_MS: "20"
  FIZZBUZZ_EVALUATION_CHAIN_THREAD_BOUNDARY_ENABLED: "true"
  FIZZBUZZ_EVALUATION_CHAIN_CACHING_ENABLED: "true"
  FIZZBUZZ_EVALUATION_CHAIN_MAX_CACHE_SIZE: "1000"
  FIZZBUZZ_SLO_ALERTING_THRESHOLD_MS: "10"
  FIZZBUZZ_SLO_BUDGET_WARNING_PCT: "80"
  FIZZBUZZ_CONFIGURATION_PROFILE: "ENTERPRISE_FULL"
  NODE_ENV: "production"
