apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fizzbuzz-network-policy
  namespace: fizzbuzz-system
spec:
  podSelector:
    matchLabels:
      app: fizzbuzz
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: fizzbuzz
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: fizzbuzz
      ports:
        - port: 3000
          protocol: TCP
