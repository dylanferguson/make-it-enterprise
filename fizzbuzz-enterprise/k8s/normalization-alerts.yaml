apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fizzbuzz-output-normalization-alerts
  namespace: fizzbuzz-system
  labels:
    app: fizzbuzz
    component: normalization-alerts
    tier: enterprise
spec:
  groups:
    - name: fizzbuzz-output-normalization
      interval: 30s
      rules:
        - alert: OutputNormalizationPipelineHighLatency
          expr: |
            histogram_quantile(0.99, rate(fizzbuzz_normalization_duration_seconds_bucket[5m])) > 0.01
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "FizzBuzz output normalization p99 latency exceeds 10ms"
            description: "The output normalization pipeline is taking longer than expected to trim and validate strings."
        - alert: NormalizationFallbackActivated
          expr: |
            rate(fizzbuzz_normalization_fallback_total[5m]) > 0
          for: 30s
          labels:
            severity: info
          annotations:
            summary: "Output normalization fallback activated"
            description: "The normalization pipeline fell back to the raw result for one or more computations."
