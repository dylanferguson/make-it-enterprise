apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fizzbuzz-enterprise-computation-hpa
  namespace: fizzbuzz-enterprise
  labels:
    app.kubernetes.io/name: fizzbuzz-enterprise
    app.kubernetes.io/component: computation-engine
    app.kubernetes.io/part-of: fizzbuzz-enterprise-edition
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fizzbuzz-enterprise-deployment
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Pods
      pods:
        metric:
          name: fizzbuzz_computations_per_second
        target:
          type: AverageValue
          averageValue: 1000
    - type: Pods
      pods:
        metric:
          name: fizzbuzz_normalization_p99_latency_ms
        target:
          type: AverageValue
          averageValue: 80
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
